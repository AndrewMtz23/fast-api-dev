name: Node.js CI

on:
  push:
    branches: ["main"] # efe 2
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: andrewmtz23/fast-api-dev

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  sonar-analysis:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Fast-Api-Sonnar
            -Dsonar.qualitygate.wait=true

  k6-load-test:
    name: K6 Load Tests
    runs-on: ubuntu-latest
    needs:
      - test
      - sonar-analysis
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start application
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          cat app.log || true
          exit 1

      - name: Run local k6 load test and export summary
        run: |
          mkdir -p artifacts
          k6 run \
            --env BASE_URL=http://127.0.0.1:3000 \
            --summary-export artifacts/k6-summary.json \
            k6/api-load-test.js | tee artifacts/k6-console.txt

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-artifacts
          path: |
            artifacts/
            app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

  build-and-push:
    name: Build and Push Docker Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - test
      - sonar-analysis
      - k6-load-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Cloud Server
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              docker stop my-node-app || true
              docker rm my-node-app || true
              docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
              docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
