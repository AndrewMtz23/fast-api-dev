name: Node.js CI

on:
  push:
    branches: ["main"] # efe 2
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: andrewmtz23/fast-api-dev

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  sonar-analysis:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Fast-Api-Sonnar
            -Dsonar.qualitygate.wait=true

  k6-load-test:
    name: K6 Load Tests
    runs-on: ubuntu-latest
    needs:
      - test
      - sonar-analysis
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start application
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          cat app.log || true
          exit 1

      - name: Run local k6 load test and export summary
        run: |
          mkdir -p artifacts
          k6 run \
            --env BASE_URL=http://127.0.0.1:3000 \
            --summary-export artifacts/k6-summary.json \
            k6/api-load-test.js | tee artifacts/k6-console.txt

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-artifacts
          path: |
            artifacts/
            app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

  build-and-push:
    name: Build and Push Docker Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - test
      - sonar-analysis
      - k6-load-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Blue-Green Deploy to Cloud Server
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              set -e
              if ! command -v envsubst >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y gettext-base
              fi
              sudo mkdir -p /etc/nginx/templates
              sudo tee /etc/nginx/templates/pipeline-blue-green.conf.template > /dev/null <<'NGINX_TEMPLATE'
              # pipeline-blue-green.conf.template
              # Generated by the CI/CD blue-green deployment pipeline.

              upstream backend_servers {
                  server ${APP_TARGET_IP}:${APP_TARGET_PORT};
              }

              server {
                  listen 80;
                  server_name _;

                  location / {
                      proxy_pass http://backend_servers;
                      proxy_http_version 1.1;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      add_header X-Deployment-Color ${DEPLOYMENT_COLOR} always;
                  }
              }
              NGINX_TEMPLATE
              sudo tee /usr/local/bin/blue-green-deploy.sh > /dev/null <<'DEPLOY_SCRIPT'
              #!/usr/bin/env bash
              set -euo pipefail

              IMAGE="${IMAGE:?IMAGE is required}"
              STATE_FILE="${STATE_FILE:-/etc/nginx/current_deploy.env}"
              TEMPLATE_PATH="${TEMPLATE_PATH:-/etc/nginx/templates/pipeline-blue-green.conf.template}"
              NGINX_CONFIG_PATH="${NGINX_CONFIG_PATH:-/etc/nginx/conf.d/default.conf}"
              APP_TARGET_IP="${APP_TARGET_IP:-127.0.0.1}"
              BLUE_PORT="${BLUE_PORT:-8080}"
              GREEN_PORT="${GREEN_PORT:-8081}"

              CURRENT_COLOR="green"
              if [ -f "$STATE_FILE" ]; then
                source "$STATE_FILE"
                CURRENT_COLOR="${CURRENT_COLOR:-${DEPLOYMENT_COLOR:-green}}"
              fi

              case "${CURRENT_COLOR,,}" in
                blue)
                  TARGET_COLOR="green"
                  APP_TARGET_PORT="$GREEN_PORT"
                  CONTAINER_NAME="app-green"
                  ;;
                green)
                  TARGET_COLOR="blue"
                  APP_TARGET_PORT="$BLUE_PORT"
                  CONTAINER_NAME="app-blue"
                  ;;
                *)
                  echo "Error: invalid current color in ${STATE_FILE}: ${CURRENT_COLOR}" >&2
                  exit 1
                  ;;
              esac

              export APP_TARGET_IP
              export APP_TARGET_PORT
              export DEPLOYMENT_COLOR="$TARGET_COLOR"

              docker pull "$IMAGE"
              docker stop "$CONTAINER_NAME" >/dev/null 2>&1 || true
              docker rm "$CONTAINER_NAME" >/dev/null 2>&1 || true
              docker run -d \
                --name "$CONTAINER_NAME" \
                -p "${APP_TARGET_PORT}:3000" \
                --restart unless-stopped \
                "$IMAGE"

              for attempt in $(seq 1 30); do
                if curl -fsS "http://${APP_TARGET_IP}:${APP_TARGET_PORT}/health" >/dev/null; then
                  break
                fi

                if [ "$attempt" -eq 30 ]; then
                  echo "Error: ${TARGET_COLOR} deployment did not become healthy." >&2
                  docker logs "$CONTAINER_NAME" || true
                  exit 1
                fi

                sleep 2
              done

              TEMP_CONFIG="$(mktemp)"
              cleanup() {
                rm -f "$TEMP_CONFIG"
              }
              trap cleanup EXIT

              envsubst '${APP_TARGET_IP} ${APP_TARGET_PORT} ${DEPLOYMENT_COLOR}' < "$TEMPLATE_PATH" > "$TEMP_CONFIG"

              rm -f "$NGINX_CONFIG_PATH"
              install -m 0644 "$TEMP_CONFIG" "$NGINX_CONFIG_PATH"

              if nginx -t; then
                systemctl reload nginx
              else
                echo "Error: Nginx configuration test failed. Service was not reloaded." >&2
                exit 1
              fi

              mkdir -p "$(dirname "$STATE_FILE")"
              cat > "$STATE_FILE" <<EOF
              CURRENT_COLOR=${TARGET_COLOR}
              APP_TARGET_IP=${APP_TARGET_IP}
              APP_TARGET_PORT=${APP_TARGET_PORT}
              DEPLOYMENT_COLOR=${TARGET_COLOR}
              IMAGE=${IMAGE}
              UPDATED_AT=$(date -Is)
              EOF

              echo "Blue-Green deploy complete: ${CURRENT_COLOR} -> ${TARGET_COLOR} (${APP_TARGET_IP}:${APP_TARGET_PORT})"
              DEPLOY_SCRIPT
              sudo chmod +x /usr/local/bin/blue-green-deploy.sh
              sudo rm -f /etc/nginx/sites-enabled/default
              echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
              sudo env IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main /usr/local/bin/blue-green-deploy.sh
