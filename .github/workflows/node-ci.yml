name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  sonar-analysis:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Fast-Api-Sonnar
            -Dsonar.qualitygate.wait=true

  k6-load-test:
    name: K6 Load Tests
    runs-on: ubuntu-latest
    needs:
      - test
      - sonar-analysis
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start application
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          cat app.log || true
          exit 1

      - name: Run local k6 load test and export summary
        run: |
          mkdir -p artifacts
          k6 run \
            --env BASE_URL=http://127.0.0.1:3000 \
            --summary-export artifacts/k6-summary.json \
            k6/api-load-test.js | tee artifacts/k6-console.txt

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-artifacts
          path: |
            artifacts/
            app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
