name: K6 Load Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  k6-load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start application
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          cat app.log || true
          exit 1

      - name: Run local k6 load test and export summary
        run: |
          mkdir -p artifacts
          k6 run \
            --env BASE_URL=http://127.0.0.1:3000 \
            --summary-export artifacts/k6-summary.json \
            k6/api-load-test.js | tee artifacts/k6-console.txt

      - name: Stream results to Grafana Cloud k6
        if: ${{ secrets.K6_CLOUD_TOKEN != '' && secrets.K6_CLOUD_PROJECT_ID != '' }}
        uses: grafana/run-k6-action@v1
        env:
          BASE_URL: http://127.0.0.1:3000
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        with:
          path: |
            ./k6/api-load-test.js
          cloud-run-locally: true
          debug: true

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-artifacts
          path: |
            artifacts/
            app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
